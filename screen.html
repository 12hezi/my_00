<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>廉洁承诺签名公示大屏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", serif;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(150deg, #f5faf7, #e8f3ee);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .lotus-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#c2e0d0 0.6px, transparent 0.6px);
            background-size: 28px 28px;
            opacity: 0.35;
        }
        .show-panel {
            background: rgba(255,255,255,0.85);
            border-radius: 20px;
            padding: 80px 130px;
            box-shadow: 0 6px 45px rgba(48, 126, 86, 0.1);
            border: 1px solid rgba(86, 172, 126, 0.28);
            z-index: 2;
        }
        .title {
            font-size: 40px;
            color: #20603f;
            text-align: center;
            letter-spacing: 7px;
            margin-bottom: 55px;
        }
        .sign-text {
            font-size: 108px;
            font-weight: bold;
            color: #16472e;
            text-align: center;
            letter-spacing: 14px;
            min-height: 125px;
        }
        .desc {
            margin-top: 42px;
            font-size: 21px;
            color: #40805f;
            text-align: center;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div class="lotus-bg"></div>
    <div class="show-panel">
        <div class="title">廉洁承诺签名公示</div>
        <div class="sign-text" id="signName">静待签名</div>
        <div class="desc">修身律己 廉洁奉公</div>
    </div>

    <script>
        const API_URL = "https://jsonblob.com/api/jsonBlob/1184617234523643904";

        async function refreshSign() {
            try {
                let res = await fetch(API_URL);
                let data = await res.json();
                document.getElementById("signName").innerText = data.name || "静待签名";
            } catch (err) {}
        }

        // 每1秒拉取一次云端数据，实现实时同步
        setInterval(refreshSign, 1000);
        refreshSign();
    </script>
</body>
</html>
